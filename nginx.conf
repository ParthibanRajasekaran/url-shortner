worker_processes auto;

events {
    worker_connections 1024;
}

http {

    # Rate limiting zone: 10MB shared memory, 10 req/min per IP
    # Using $binary_remote_addr saves memory vs $remote_addr (4 bytes vs up to 15)
    limit_req_zone $binary_remote_addr zone=post_limit:10m rate=10r/m;

    upstream shortener_api {
        # Docker Compose DNS resolves "swiftlink-api" to all 3 replica containers
        # NGINX performs round-robin load balancing automatically
        server swiftlink-api:8080;
    }

    server {
        listen 80;
        server_name _;

        # POST endpoint - rate limited
        location = /api/v1/urls {
            limit_req zone=post_limit burst=5 nodelay;
            limit_req_status 429;

            proxy_pass         http://shortener_api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Redirect endpoint - proxy_redirect off preserves the 301 Location header
        location ~* "^/[a-zA-Z0-9]{1,7}$" {
            proxy_pass         http://shortener_api;
            proxy_redirect     off;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Actuator passthroughs (no rate limit)
        location /actuator/health {
            proxy_pass http://shortener_api;
        }

        location /actuator/prometheus {
            proxy_pass http://shortener_api;
        }

        # Block all other paths
        location / {
            return 404;
        }

        error_page 429 /429.html;
        location = /429.html {
            default_type application/json;
            return 429 '{"status":429,"error":"Too Many Requests","message":"Rate limit exceeded"}';
        }
    }
}
